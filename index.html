<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa História ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

#intro{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#intro img{
    width:100%;
    height:100%;
    object-fit:contain;
    opacity:1;
    transition:opacity .8s;
}

video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
    display:none;
}

</style>

</head>

<body>

<div id="intro">

<img src="https://i.imgur.com/5M4Jz8o.jpeg">

</div>

<video
id="video"
playsinline
autoplay
muted
controlslist="nodownload"
disablepictureinpicture>

<source src="https://res.cloudinary.com/gnpsibau/video/upload/v1784165978/0715_lcyi0u.mp4" type="video/mp4">

</video>

<script>

const intro=document.getElementById("intro");
const video=document.getElementById("video");

setTimeout(()=>{

intro.style.opacity="0";

setTimeout(()=>{

intro.style.display="none";

video.style.display="block";

video.muted=false;

video.play();

},800);

},2500);

video.addEventListener("ended",()=>{

video.pause();

});

</script>

</body>
</html>
