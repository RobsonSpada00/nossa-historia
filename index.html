<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}
#start{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:22px;
}
h1{font-size:clamp(32px,5vw,56px)}
p{color:#bbb;font-size:18px}
button{
    padding:16px 34px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    background:#e91e63;
    color:white;
}
button:hover{transform:scale(1.03)}
#player{
    display:none;
    width:100%;
    height:100%;
    justify-content:center;
    align-items:center;
}
video{
    height:100vh;
    max-width:100vw;
    max-height:100vh;
    background:#000;
}
</style>
</head>
<body>

<div id="start">
    <h1>Nossa História ❤️</h1>
    <p>Um vídeo feito especialmente para você.</p>
    <button onclick="iniciar()">▶ Começar nossa história</button>
</div>

<div id="player">
<video id="video" controls playsinline preload="auto">
<source src="https://res.cloudinary.com/gnpsibau/video/upload/v1784165978/0715_lcyi0u.mp4" type="video/mp4">
Seu navegador não suporta vídeo.
</video>
</div>

<script>
function iniciar(){
    document.getElementById("start").style.display="none";
    document.getElementById("player").style.display="flex";
    const v=document.getElementById("video");
    v.play();
}
</script>

</body>
</html>
